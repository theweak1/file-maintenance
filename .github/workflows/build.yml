name: Build Binary

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-build:
    name: Test and build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{matrix.runner}}

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: .exe
            archive: zip

          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
            archive: tar.gz

          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ext: ""
            archive: tar.gz

          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ext: ""
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

      - name: Resolve version metadata
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi

          BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.vars.outputs.version }}
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ steps.vars.outputs.build_date }}
        run: |
          mkdir -p dist

          NAME="file-maintenance_${VERSION}_${GOOS}_${GOARCH}"
          OUT="dist/${NAME}${{ matrix.ext }}"

          go build -trimpath \
            -ldflags="-s -w -X 'file-maintenance/internal/version.Version=${VERSION}' -X 'file-maintenance/internal/version.Commit=${COMMIT}' -X 'file-maintenance/internal/version.BuildDate=${BUILD_DATE}'" \
            -o "${OUT}" \
            ./cmd/main

      - name: Archive Windows artifact
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $name = "file-maintenance_${{ steps.vars.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          Compress-Archive -Path "dist/$name.exe" -DestinationPath "dist/$name.zip" -Force

      - name: Archive Unix artifact
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          NAME="file-maintenance_${{ steps.vars.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}"
          tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: file-maintenance-${{ steps.vars.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          retention-days: 30

  release:
    name: Create GitHub Release
    if: always() && startsWith(github.ref, 'refs/tags/v')
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Show downloaded artifacts
        shell: bash
        run: |
          echo "Downloaded artifact tree:"
          find release-assets -type f -print || true

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t ASSETS < <(find release-assets -type f \( -name "*.zip" -o -name "*.tar.gz" \))

          if [[ ${#ASSETS[@]} -eq 0 ]]; then
            echo "No release assets were found. Skipping release creation."
            exit 0
          fi

          printf "Release assets:\n"
          printf '%s\n' "${ASSETS[@]}"

          # Default notes
          NOTES="Automated release for ${GITHUB_REF_NAME}"

          # If changelog exists, prefer it when it was updated in this commit
          if [ -f .github/changelog.md ]; then
            PARENT=$(git rev-parse "${GITHUB_SHA}^" 2>/dev/null || true)
            if [ -n "$PARENT" ]; then
              if git diff --name-only "$PARENT" "$GITHUB_SHA" | grep -q "^.github/changelog.md$"; then
                NOTES="$(cat .github/changelog.md)"
              else
                echo ".github/changelog.md unchanged in this commit; using default notes"
              fi
            else
              # No parent commit (possible for root/tagged initial commit) — use the file
              NOTES="$(cat .github/changelog.md)"
            fi
          else
            echo ".github/changelog.md not found; using default notes"
          fi

          gh release create "${GITHUB_REF_NAME}" "${ASSETS[@]}" \
            --title "file-maintenance ${GITHUB_REF_NAME}" \
            --notes "$NOTES"
